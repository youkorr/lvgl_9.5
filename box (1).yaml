            #brightness: 100%
    effects:
      - pulse:
          transition_length: 650ms
          update_interval: 650ms
          min_brightness: 70%
          max_brightness: 100%
      - pulse:
          name: Fast Pulse
          transition_length: 50ms
          update_interval: 50ms
      - pulse:
          name: Slow Pulse
          transition_length: 1000ms
          update_interval: 1000ms
          min_brightness: 85%
          max_brightness: 100%
      - strobe:
      - strobe:
          name: Strobe Effect With Custom Values
          colors:
            - state: true
              brightness: 100%
              red: 100%
              green: 90%
              blue: 0%
              duration: 600ms
            - state: false
              duration: 250ms
            - state: true
              brightness: 100%
              red: 0%
              green: 100%
              blue: 0%
              duration: 600ms            

