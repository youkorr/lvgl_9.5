############################################################### LGVL ###########################################################################################################################
lvgl:
  byte_order: little_endian
  displays:
    - my_display  
  touchscreens:
    - gt911_touchscreen

  on_idle:
    - timeout: !lambda return id(s_saver_blank_delay).state * 1000;
      then:
        if: 
          condition:
            - light.is_on: led
          then:
            - lvgl.page.show: page_home

    - timeout: !lambda return id(s_saver_delay).state * 1000;
      then:
        if: 
          condition:
            - light.is_on: led
          then:
            - light.turn_off: led  

   
  
  #animations:
    #- id: test
      #duration: 4s # 5 secondes en millisecondes
      #timing:
        #- type: gravity
          #acceleration: 25.0
      # Définition des paramètres de mouvement du widget
      #widgets:
        #- id: home_button_center
          #x:
            #from: !lambda "return random_uint32() % 200;"
            #to: !lambda "return random_uint32() % 200;"


  msgboxes:
    - id: person_detection_popup
      title: "ALERTE"
      body:
        text: "Person detected!"
        bg_color: color_red
        text_color: color_white
      buttons:
        - id: popup_camera
          text: "cctv"
          on_click:
            then:
              - lvgl.widget.hide: person_detection_popup
              - lvgl.page.show: page_cctv



  style_definitions:

    - id: menu_button
      radius: 40      
      text_font: nunito_20
      text_align: CENTER
      bg_color: 0x2F8CD8
      bg_grad_color: 0x0460BD
      bg_grad_dir: VER
      border_width: 5
      border_color: 0x1e84eb
      border_opa: 50%
      outline_width: 1
    #- id: time_style
      #text_color: 0xD5D5D5
      #bg_opa: TRANSP
      #radius: 5
      #border_color: 0xE9E9E9
      #border_width: 0
      #border_opa:
      #pad_all: 0
      #shadow_width: 0
      #shadow_opa: TRANSP
    - id: card
      text_color: 0xD5D5D5
      bg_color: 0x222222
      bg_opa: COVER
      radius: 20
      outline_width: 0
      border_width: 0
      #border_opa:
      pad_all: 0 
    - id: weather_style
      text_color: 0xD5D5D5
      bg_color: 0
      bg_opa: TRANSP
      outline_width: 0
      border_width: 0
      #border_opa:
      radius: 0
      pad_all: 0
    - id: meter_style
      text_color: 0xD5D5D5
      bg_color: 0x222222
      bg_opa: COVER
      radius: 10
      outline_width: 0
      border_width: 0
      #border_opa:
      pad_all: 0      
    - id: button_light
      bg_color: 0xCCCCCC
      bg_grad_color: 0xFF4400
      bg_grad_dir: HOR
      border_width: 8
      border_color: 0x222222
      border_opa: 50%
      outline_width: 1
    - id: button_menu
      text_color: 0xD5D5D5
      bg_color: 0x222222
      bg_opa: COVER
      radius: 20
      pad_all: 5
    - id: button_checked
      bg_color: 0xFF4400
      bg_opa: COVER
      text_color: 0xD5D5D5
      radius: 20
      pad_all: 5 


    - id: sound_page
      bg_opa: TRANSP
      border_opa: TRANSP
      radius: 0
      text_color: 0xCCCCCC  # Gris clair pour le texte
      width: 100%
      height: 100%


    - id: home_page
      bg_opa: TRANSP
      border_opa: TRANSP
      radius: 0
      text_color: 0xFFFFFF
      width: 100%
      height: 100%

    - id: controls_page
      bg_opa: TRANSP
      border_opa: TRANSP
      radius: 0
      text_color: 0xFFFFFF
      width: 100%
      height: 100%  

    - id: main_content
      bg_opa: TRANSP
      border_opa: TRANSP
      radius: 0
      text_color: 0xFFFFFF
      width: 100%
      height: 100%

    - id: f1_page
      bg_opa: TRANSP
      border_opa: TRANSP
      radius: 0
      text_color: 0xFFFFFF
      width: 100%
      height: 100%

    - id: style_line
      line_color: 0x0000FF
      line_width: 8
      line_rounded: true
    - id: date_style
      text_font: nunito_24
      align: center
      text_color: 0x333333
      bg_opa: cover
      radius: 4
      pad_all: 2

    ####Header_Footer##########
    - id: header_footer
      bg_color: 0x2F8CD8
      bg_grad_color: 0x005782
      bg_grad_dir: VER
      bg_opa: COVER
      border_width: 0
      radius: 0
      pad_all: 0
      pad_row: 0
      pad_column: 0
      border_color: 0x0077b3
      text_color: 0xFFFFFF
      width: 100%
      height: 30

    - id:         style_temp
      text_font:  fonttemp
      text_color: 0xF0F0F0
      bg_opa:     TRANSP
      radius:     0
      pad_all:    0
      #align:      TOP_RIGHT    

    - id:            style_object
      x:             0
      y:             0
      width:         100%
      height:        100%
      bg_color:      0x000000 # black
      bg_opa:        cover
      radius:        0
      pad_all:       0
      border_width:  0
      outline_width: 0
      
      #outline_width: 1        # dev settings
      #outline_color: 0x444444 # dev settings  
    
  pages:
    - id: page_home
      bg_color: color_black
      on_load:
          then:
            - lvgl.image.update:
                id: update_wallpaper
                src: essais3
      widgets: 
        - label:
            id: timer_play_icon
            align: TOP_RIGHT
            x: -170
            y: 5
            text: "${timer_play}"
            text_color: color_green
            text_font: mdi24
            hidden: true  # Caché par défaut

        - image:
            id: update_wallpaper
            src: essais3
            width: 320
            height: 240
            x: 0
            y: 0             
        - label:
            id: timer_off_icon
            align: TOP_RIGHT
            x: -170
            y: 5
            text: "${timer_off}"
            text_color: color_gray
            text_font: mdi24
            hidden: false  # Visible par défaut (timer arrêté)

        # Lecture de musique
        - label:
            id: music_play_status
            align: TOP_RIGHT
            x: -140
            y: 5
            text: "${music_play}"  # Variable pour l'état de lecture
            text_color: color_yellow
            text_font: mdi24
          
        - label:
            id: lbl_battery_status
            align: TOP_LEFT
            y: 5
            x: 180
            text_color: color_blue
            text_font: battery_icons_24
            text: "\U000F0091"            
      # Alarm status
        - label:
            id: alarme_status
            align: TOP_RIGHT
            x: -40
            y: 5
            text: "${arming}"
            text_color: color_red
            text_font: mdi24
          
      # Motion status
        - label:
            id: wifi_status
            align: TOP_RIGHT
            x: -15
            y: 5
            text: "${wifi_100}"
            text_color: color_black
            text_font: icons_24
            
        - label:
            id: ha_status
            align: TOP_RIGHT
            x: -65
            y: 5
            text: "${ha}"
            text_color: color_black
            text_font: icons_24

        - label:
            id: motion_status
            align: TOP_RIGHT
            x: -90
            y: 5
            text: "${motion}"
            text_color: color_black
            text_font: icons_24      
        # TIME
        - label:
            id: display_time
            align: TOP_LEFT
            x: 110
            y: 70
            text_font: nunito_48
            text_color: color_cyan
            text: "23:59"

      # DATE
        - label:
            id: display_date
            x: 165
            y: 120
            align: TOP_LEFT
            text_font: nunito_18
            text_color: color_white
            text: "01 June"

      # DAY OF WEEK
        - label:
            id: display_day
            align: TOP_LEFT
            x: 85
            y: 60
            text_font: nunito_18
            text_color: color_white
            text: "Sunday"

      # WEATHER ICON  
        - animimg:
            id: weather_rainy
            hidden: true
            x: 7
            y: 5
            align: TOP_LEFT
            src: [ rainy0, rainy1, rainy2, rainy3, rainy4, rainy5, rainy6, rainy7, rainy8, rainy9, rainy10, rainy11]
            duration: 1200ms
        - animimg:
            id: weather_pouring
            hidden: true
            x: 7
            y: 5
            align: TOP_LEFT
            src: [ pouring0, pouring1, pouring2, pouring3, pouring4, pouring5, pouring6, pouring7, pouring8, pouring9, pouring10, pouring11 ]
            duration: 400ms
        - animimg:
            id: weather_lightning_rainy
            hidden: true
            x: 7
            y: 5
            align: TOP_LEFT
            src: [ lightning_rainy0, rainy1, lightning_rainy1, rainy3, rainy4, rainy5, rainy6, rainy7, rainy8, rainy9, rainy10, rainy11,
                    lightning_rainy2, rainy1, lightning_rainy3, rainy3, rainy4, rainy5, rainy6, rainy7, rainy8, rainy9, rainy10, rainy11
                  ]
            duration: 1500ms
        - animimg:
            id: weather_snowy_rainy
            hidden: true
            x: 7
            y: 5
            align: TOP_LEFT
            src: [ snowy_rainy0, snowy_rainy1, snowy_rainy2, snowy_rainy3, snowy_rainy4, snowy_rainy5, snowy_rainy6, snowy_rainy7, snowy_rainy8,
                    snowy_rainy9, snowy_rainy10, snowy_rainy11
                  ]
            duration: 1200ms
        - animimg:
            id: weather_snowy
            hidden: true
            x: 7
            y: 5
            align: TOP_LEFT
            src: [ snowy0, snowy1, snowy2, snowy3, snowy4, snowy5, snowy6, snowy7, snowy8, snowy9, snowy10, snowy11 ]
            duration: 1200ms
        - button:
            id: weather_sunny
            hidden: true
            pad_all: 0
            width: 100
            height: 100
            x: 7
            y: 5
            bg_opa: TRANSP
