    - id: page_thermostat
      bg_color: color_black
      widgets:
        - obj:
            bg_opa: TRANSP
            border_opa: TRANSP
            shadow_opa: TRANSP
            width: 288
            height: 288
            y: -5  # Move the thermostat slightly higher by adjusting the y position
            align: CENTER  # Center the entire thermostat widget
            widgets:
              - meter:
                  height: 192
                  width: 192
                  border_width: 0
                  bg_opa: TRANSP
                  align: CENTER
                  scales:
                    - range_from: 5
                      range_to: 45
                      angle_range: 270
                      ticks:
                        width: 1
                        count: 41
                        length: 6
                        color: color_white
                        major:
                          stride: 5
                          width: 3
                          length: 9
                          color: color_white
                          label_gap: 9
                      indicators:
                        - tick_style:
                            start_value: 5
                            end_value: 45
                            color_start: color_blue
                            color_end: color_crimson
                            width: 1

