            on_press:
              then:
                - lambda: |-
                    if (!id(timer_running) && id(countdown_time) > 5) {
                      id(countdown_time) -= 5;
                    }
                - lvgl.label.update:
                    id: timer_label
                    text: !lambda |-
                      return (std::to_string(id(countdown_time)) + "\nsec").c_str();
                - lvgl.arc.update:
                    id: arc_timer
                    value: !lambda "return id(countdown_time);"
        
        # Bouton + (augmenter la durée) - au-dessus du bouton Start
        - button:
            x: -110
            y: -85
            width: 60
            height: 60
            radius: 30
            bg_color: color_dark_gray
            border_color: color_white
            border_width: 2
            align: CENTER
            widgets:
              - label:
                  align: CENTER
                  text_font: montserrat_20
                  text_color: color_white
                  text: "+"
            on_press:
              then:
                - lambda: |-
                    if (!id(timer_running) && id(countdown_time) < 300) {
                      id(countdown_time) += 5;
                    }
                - lvgl.label.update:
                    id: timer_label
                    text: !lambda |-
                      return (std::to_string(id(countdown_time)) + "\nsec").c_str();
                - lvgl.arc.update:
                    id: arc_timer
                    value: !lambda "return id(countdown_time);"

        # Cadran principal avec graduations pour secondes et centièmes
        - meter:
            id: timer_meter
            align: CENTER
            width: 220
            height: 220
            scales:
              # Échelle principale (secondes seulement)
              - range_from: 0
                range_to: 60
                angle_range: 360
                rotation: 270
                ticks:
                  count: 61
                  length: 8
                  color: color_green
                  width: 2
                  major:
                    stride: 5
                    length: 12
                    color: color_white
                indicators:
                  # Aiguille principale (secondes)
                  - line:
                      id: needle_indicator
                      width: 4
                      color: color_red
                      r_mod: -10
                  # Aiguille des centièmes (plus fine et plus courte)
                  #- line:
                      #id: centisecond_needle
                      #width: 2
                      #color: color_orange
                      #r_mod: -30  # Plus courte que l'aiguille principale
        # Arc du temps restant
        - arc:
            id: arc_timer
            align: CENTER
            width: 220
            height: 220
            min_value: 0
            max_value: 300  # Augmenté pour supporter jusqu'à 5 minutes
            value: !lambda "return id(countdown_time);"
            arc_width: 12
            indicator:
              arc_color: color_red
              arc_width: 12
            knob:
              border_opa: TRANSP
        # Texte du minuteur
        - label:
            id: timer_label
            align: CENTER
            text_font: nunito_36
            text_color: color_black
            text: !lambda |-
              return (std::to_string(id(countdown_time)) + "\nsec").c_str();
        # Icône de cloche
        - image:
            src: cloche
            id: cloche_img
            x: 0
            y: 50
            width: 34
            height: 28
            align: CENTER
        # Bouton de démarrage (rond et petit) - à l'extérieur du cadran
        - button:
            x: -110
            y: 85
            width: 60
            height: 60
            radius: 30
            bg_color: color_deep_orange
            border_color: color_white
            border_width: 2
            align: CENTER
            widgets:
              - label:
                  id: start_button_label
                  align: CENTER
                  text_font: montserrat_16
                  text_color: color_white
                  text: "Start"
            on_press:
              then:
                - script.execute: toggle_timer_script
        
        # Bouton de reset (rond et petit) - à l'extérieur du cadran
        - button:
            x: 110
            y: 85
            width: 60
            height: 60
            radius: 30
            bg_color: color_blue
            border_color: color_white
            border_width: 2
            align: CENTER
            widgets:
              - label:
                  align: CENTER
                  text_font: montserrat_16
                  text_color: color_white
                  text: "Stop"
            on_press:
              then:
                - script.execute: reset_timer_script
                        

