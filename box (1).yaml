    ########################################################################## PAGE ALARM ########################################################################################
    - id: page_alarm
      bg_color: color_gray
      widgets:
          - obj:
              id: alarm_code
              align: TOP_MID
              y: 14
              width: 100
              height: 25
              bg_color: 0xFFFFFF
              shadow_color: 0
              shadow_opa: 50%
              radius: 5
              widgets:
                - label:
                    id: label_alarm_code
                    align: CENTER
                    text_align: CENTER
                    text: "Code + \uF00C"
                    text_color: sec_color
          - buttonmatrix:
              id: key_alarm
              align: TOP_MID
              y: 35
              width: 260
              height: 210
              border_opa: TRANSP
              bg_opa: TRANSP
              items:
                bg_color: color_red
                text_color: color_white
                shadow_opa: TRANSP
                pressed:
                  bg_color: nova_color
                  text_color: sec_color
              one_checked: true
              rows:
                - buttons:
                    - <<: &hidden
                        text: 0
                        width: 1
                        control:
                          hidden: true
                    - text: 1
                      <<: &keybutton
                        width: 2
                        control:
                          no_repeat: true
                          recolor: true
                    - text: 2
                      <<: *keybutton
                    - text: 3
                      <<: *keybutton
                    - <<: *hidden
                - buttons:
                    - text: 4
                      <<: *keybutton
                    - text: 5
                      <<: *keybutton
                    - text: 6
                      <<: *keybutton
                    - text: 7
                      <<: *keybutton
                - buttons:
                    - <<: *hidden
                    - text: 8
                      <<: *keybutton
                    - text: 9
                      <<: *keybutton
                    - text: 0
                      <<: *keybutton
                    - <<: *hidden
                - buttons:
                    - text: "ARM"
                      key_code: "A"  # Arm button
                      <<: *keybutton
                      width: 4  # Agrandir ARM
                    - <<: *hidden  # Espace caché pour décaler CLEAR
                    - text: "CLEAR"
                      key_code: "*"  # Clear button
                      <<: *keybutton
                      width: 4
                    - <<: *hidden  # Espace caché pour décaler DISARM
                    - text: "DISARM"
                      key_code: "D"  # Disarm button
                      <<: *keybutton
                      width: 4  # Agrandir DISARM   


