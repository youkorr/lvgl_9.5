number:
  - id: s_saver_delay
    platform: template
    name: "Scr/save delay"
    icon: 'mdi:sleep'
    entity_category: config
    unit_of_measurement: 'secs'
    optimistic: true
    restore_value: true
    initial_value: 60
    step: 5
    min_value: 10
    max_value: 999999
    on_value:
      then:
        - lambda: |-
            int value = x;
            int index = 0;
            static const int backlight_time[] = {60, 80, 360};
            for (int i = 0; i < 4; i++) {
              if (backlight_time[i] == value) {
                index = i;
                break;
              }
            }
            id(display_timeout_global1) = index;
        - component.update: my_display
        - script.execute: saver_enabled

      
  - id: s_saver_blank_delay
    platform: template
    name: "Scr/off delay"
    icon: 'mdi:monitor-off'
    entity_category: config
    unit_of_measurement: 'secs'
    optimistic: true
    restore_value: true
    initial_value: 60
    step: 5
    min_value: 10
    max_value: 999999
    on_value:
      then:
        - lambda: |-
            int value = x;
            int index = 0;
            static const int backlight_time[] = {60, 80, 360};
            for (int i = 0; i < 4; i++) {
              if (backlight_time[i] == value) {
                index = i;
                break;
              }
            }
            id(display_timeout_global2) = index;
        - component.update: s_saver_blank_delay
        - script.execute: saver_enabled
        - component.update: my_display    

  - id: s_saver_brightness
    platform: template
    name: "Scr/save Brightness"
    icon: 'mdi:sleep'
    entity_category: config
    unit_of_measurement: '%'
    optimistic: true
    restore_value: true
    initial_value: 60
    step: 5
    min_value: 20
    max_value: 100
    on_value:
      - component.update: s_saver_brightness
      - script.execute: saver_enabled
      - component.update: my_display
      
  - id: s_default_brightness
    platform: template
    name: "Default Brightness"
    icon: 'mdi:monitor'
    entity_category: config
    unit_of_measurement: '%'
    optimistic: true
    restore_value: true
    initial_value: 100
    step: 5
    min_value: 20
    max_value: 100
    on_value:
      - component.update: s_default_brightness
      - script.execute: saver_enabled
      - component.update: my_display



  - platform: template
    name: "Presence duration"
    id: radar_delayed_off
    icon: mdi:account-clock
    optimistic: true
    restore_value: true
    initial_value: 60
    min_value: 0
    step: 5
    max_value: 300
    unit_of_measurement: s
    entity_category: config
    mode: box    
    
