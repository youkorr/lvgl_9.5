################################################################################################################################################################################
####################################################### ALARM KEY ##################################################################################################################################
key_collector:
- source_id: key_alarm
  min_length: 4
  max_length: 4
  end_keys: "AD"
  end_key_required: true
  clear_keys: "*"
  allowed_keys: "0123456789"
  timeout: 3s
  on_result:
    - if:
        condition:
          and:
          - lambda: 'return id(alarm_status).state == "disarmed";'
          - lambda: "return end == 'A';"
        then:
          - homeassistant.service:
              service: alarm_control_panel.alarm_arm_away
              data:
                entity_id: alarm_control_panel.alarmo
                code: !lambda 'return x;'  
          - lvgl.label.update:
              id: label_alarm_code
              text: "ARMED"
          - lvgl.widget.update:
              id: alarm_code
              bg_color: color_green
    - if:
        condition:
          and:
          - lambda: 'return (id(alarm_status).state == "arming" || id(alarm_status).state == "armed_away" || id(alarm_status).state == "armed_home" || id(alarm_status).state == "armed_night");' 
          - lambda: "return end == 'D';"
        then:
          - homeassistant.service:
              service: alarm_control_panel.alarm_disarm
              data:
                entity_id: alarm_control_panel.alarmo
                code: !lambda 'return x;'
          - lvgl.label.update:
              id: label_alarm_code
              text: "DISARM"
          - lvgl.widget.update:
              id: alarm_code
              bg_color: color_blue


################################################################### ANIMATION #########################################################################################
interval:

  - interval: 500ms
    then:
      - if:
          condition:
            lambda: 'return id(is_alarm_active);'
          then:
            - lambda: 'id(bell_blink_state) = !id(bell_blink_state);'
            - lvgl.widget.update:
                id: cloche_img
                opa: !lambda 'return id(bell_blink_state) ? 255 : 0;'



  - interval: 10s
    then:
      - lambda: |-
          ESP_LOGI("Memory", "Free heap: %d bytes", heap_caps_get_free_size(MALLOC_CAP_INTERNAL));


  - interval: 10s
    then:
      - lambda: |-
          ESP_LOGI("Memory", "Free internal heap: %d bytes", heap_caps_get_free_size(MALLOC_CAP_INTERNAL));
          ESP_LOGI("Memory", "Free SPIRAM heap: %d bytes", heap_caps_get_free_size(MALLOC_CAP_SPIRAM));







    
