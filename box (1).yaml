# ------------------------------------------- #
# ------------ ESPHOME OPTIONS -------------- #
# ------------------------------------------- #


esphome:
  name: display
  min_version: 2025.2.0
  friendly_name: display

  platformio_options:
    board_build.flash_mode: dio
    lib_deps:
      - https://github.com/bitbank2/JPEGDEC.git#ca1e0f2


  on_boot:
    priority: -100
    then:
      - script.execute: show_page_boot
      #- script.execute: refresh_music_files
      - light.turn_on:
          id: led
          brightness: 100%
  

esp32:
  board: esp32-s3-devkitc-1
  flash_size: 16MB
  cpu_frequency: 240MHZ
  framework:
    type: esp-idf
    version: recommended
    advanced:
      disable_vfs_support_dir: false
      disable_dev_null_vfs: false

      #disable_vfs_support_select: false
      #disable_fatfs: False
      include_builtin_idf_components:
        - fatfs
        - vfs

    sdkconfig_options:
      CONFIG_SPIRAM_RODATA: y
      CONFIG_VFS_SUPPORT_IO: "y"
      CONFIG_VFS_MAX_COUNT: "16" 
      CONFIG_FATFS_LFN_STACK: "y"
      CONFIG_FATFS_LFN_HEAP: "y"
      CONFIG_LWIP_SO_RCVBUF: "y"
      CONFIG_LWIP_MAX_SOCKETS: "16"
      CONFIG_SPIRAM_USE_CAPS_ALLOC: y
      CONFIG_SPIRAM_USE_MALLOC: y
      CONFIG_ESP_MAIN_TASK_STACK_SIZE: "16384"
      CONFIG_ESP_TIMER_TASK_STACK_SIZE: "4096"
      #CONFIG_ESP_MAIN_TASK_STACK_SIZE: "16384"  # Augmente à 16KB
      #CONFIG_ESP_TIMER_TASK_STACK_SIZE: "4096"
      #CONFIG_ESP_TASK_WDT_TIMEOUT_S: "60"       # 60 secondes de timeout
      #CONFIG_ESP_TASK_LOOP_STACK_SIZE: "16384"   # <-- à ajouter
      #DCONFIG_ESP_JPG_DECODE_ENABLE: "y"
      #DCONFIG_ESPHOME_ENABLE_PNGLE: "1"

      
      #CONFIG_USB_OTG_SUPPORTED: y
      #CONFIG_USB_HOST_CONTROL_TRANSFER_MAX_SIZE: "256"
      #CONFIG_USB_HOST_HW_BUFFER_BIAS_IN: y
      #CONFIG_ESP32S3_INSTRUCTION_CACHE_32KB: "y"

      #task_stack_size: "16384"
      #task_stack_size: "12288"



##############################################################################################################################################################################        
######################################################################## AUDIO AND VOICE ASSISTANT ###########################################################################
select:

- platform: template
  entity_category: config
  name: Wake word engine location
  id: wake_word_engine_location
  optimistic: true
  restore_value: true
  options:
    - In Home Assistant
    - On device
  initial_option: In Home Assistant
  on_value:
    - if:
        condition:
          lambda: return x == "In Home Assistant";
        then:
          - micro_wake_word.stop
          - delay: 500ms
          - lambda: id(va).set_use_wake_word(true);
          - voice_assistant.start_continuous:
          - text_sensor.template.publish:
              id: wakeword_location
              state: !lambda 'return "Home Assistant";'
          - component.update: my_display
    - if:
        condition:
          lambda: return x == "On device";
        then:
          - text_sensor.template.publish:
              id: wakeword_location
              state: !lambda 'return "On Device";'
          - lambda: id(va).set_use_wake_word(false);
          - voice_assistant.stop
          - delay: 500ms
          - micro_wake_word.start
          - component.update: my_display
######################################################################################################################################

                                                                                            
i2s_audio:
  - id: mic_bus
    i2s_lrclk_pin:
      number: GPIO45
      ignore_strapping_warning: true
    i2s_bclk_pin: GPIO17
    i2s_mclk_pin: GPIO2

audio_adc:
  - platform: es7210
    id: es7210_adc
    i2c_id: bus_a
    bits_per_sample: 16bit
    sample_rate: 16000

audio_dac:
  - platform: es8311
    id: es8311_dac
    i2c_id: bus_a
    bits_per_sample: 16bit
    sample_rate: 48000

microphone:
  - platform: i2s_audio
    id: box_microphone
    i2s_audio_id: mic_bus
    sample_rate: 16000
    i2s_din_pin: GPIO16
    bits_per_sample: 16bit
    adc_type: external

speaker:
  - platform: i2s_audio
    id: box3_speaker
    i2s_audio_id: mic_bus
    i2s_dout_pin: GPIO15
    audio_dac: es8311_dac
    dac_type: external
    channel: mono
    buffer_duration: 100ms
    bits_per_sample: 16bit
    sample_rate: 48000



  - platform: mixer
    id: mixing_speaker
    output_speaker: box3_speaker
    num_channels: 2
    source_speakers:
      - id: announcement_mixing_input
        timeout: never
      - id: media_mixing_input
        timeout: never        

  - platform: resampler
    id: announcement_resampling_speaker
    output_speaker: announcement_mixing_input
    sample_rate: 48000
    bits_per_sample: 16

  - platform: resampler
    id: media_resampling_speaker
    output_speaker: media_mixing_input
    sample_rate: 48000
    bits_per_sample: 16 


media_player:
  - platform: speaker
    name: Media Player
    internal: False
    id: speaker_media_player
    volume_increment: 0.05
    volume_min: 0.6
    volume_max: 0.8
    task_stack_in_psram: true
    codec_support_enabled: true
    announcement_pipeline:
      speaker: announcement_resampling_speaker
      format: FLAC
      sample_rate: 48000
      num_channels: 1  # S3 Box only has one output channel
    media_pipeline:
      speaker: media_resampling_speaker
      format: FLAC  # FLAC is the least processor intensive codec
      num_channels: 2
      sample_rate: 48000
    files:
      - id: timer_finished_sound
        file: https://github.com/esphome/home-assistant-voice-pe/raw/dev/sounds/timer_finished.flac 

      - id: wake_sound_file
        file: https://github.com/esphome/home-assistant-voice-pe/raw/dev/sounds/wake_word_triggered.flac  

      #- id: Interface_complete
        #file: http://192.168.1.61:5244/d/sdcard/sounds/Voicy_Interface%20complete.mp3?sign=nvyceGoO5zTRIRuT8fg5vHTSYeYS8WTqwRdRLo7KR1c=:0 
    on_announcement:
      - mixer_speaker.apply_ducking:
          id: media_mixing_input
          decibel_reduction: 20
          duration: 1.0s
    on_state:
      if:
        condition:
          and:
            - switch.is_off: timer_ringing
            - not:
                voice_assistant.is_running:
            - not:
                media_player.is_announcing:
        then:
          - mixer_speaker.apply_ducking:
              id: media_mixing_input
              decibel_reduction: 0
              duration: 1.0s

micro_wake_word:
  id: mww
  vad:
  models:
    - okay_nabu
    - hey_mycroft
    - hey_jarvis
    - alexa
  on_wake_word_detected:
    - lambda: id(global_is_assisting) = true;
    - delay: 50ms
    - if:
        condition:
          and:
            - switch.is_off: output_audio
            - switch.is_on: wake_sound
        then:
          - media_player.speaker.play_on_device_media_file:
              media_file: wake_sound_file
              announcement: true
          - wait_until:
              not:
                - media_player.is_announcing:
          - delay: 100ms
        else:
          if:
            condition:
              and:
                - switch.is_on: output_audio
                - switch.is_on: wake_sound
            then:
              - homeassistant.service:
                  service: media_player.play_media
                  data:
                    entity_id: media_player.${external_media_player}
                    media_content_id: '${home_assistant_host}/local/sounds/awake.mp3'
                    media_content_type: music
    - lvgl.page.show: page_lcars
    - component.update: my_display
    - delay: 100ms
    - voice_assistant.start:
        wake_word: !lambda return wake_word;

voice_assistant:
  id: va
  micro_wake_word: mww
  #microphone: mic_bus
  media_player: speaker_media_player  
  use_wake_word: true
  noise_suppression_level: 2
  auto_gain: 31dBFS
  volume_multiplier: 4.0
  on_wake_word_detected:
    - lambda: id(global_is_assisting) = true;
    - voice_assistant.stop:
    - lambda: id(va).set_use_wake_word(false);
    - if:
        condition:
          and:
            - switch.is_off: output_audio
            - switch.is_on: wake_sound
        then:
          # - voice_assistant.stop:
          # - delay: 150ms
          # - if:
              # condition:
                # not:
                  # microphone.is_capturing:
              # then:
          - media_player.speaker.play_on_device_media_file:
              media_file: wake_sound_file
              announcement: true
          - wait_until:
              not:
                - media_player.is_announcing:
          - delay: 150ms
          - lambda: id(va).set_use_wake_word(false);
          - lvgl.page.show: page_lcars
          - component.update: my_display
        else:
          if:
            condition:
              and:
                - switch.is_on: wake_sound
                - switch.is_on: output_audio
            then:
              - homeassistant.service:
                  service: media_player.play_media
                  data:
                    entity_id: media_player.${external_media_player}
                    media_content_id: '${home_assistant_host}/local/sounds/awake.mp3'
                    media_content_type: music
    - voice_assistant.start
  on_start:
    #- delay: 100ms 
    - lvgl.page.show: page_lcars
  on_listening:
    - text_sensor.template.publish:
        id: text_request
        state: "..."
    - text_sensor.template.publish:
        id: text_response
        state: "..."
    - script.execute: saver_enabled
    - lvgl.page.show: page_lcars
    - component.update: my_display 
  on_stt_end:
    - delay: 100ms
    - lvgl.page.show: page_lcars
    - text_sensor.template.publish:
        id: text_request
        state: !lambda return x;
  on_stt_vad_start:
    - light.turn_on: led
  on_stt_vad_end:
    - light.turn_on: led
  on_tts_start:
    - text_sensor.template.publish:
        id: text_response
        state: !lambda return x;
  
 
  on_tts_end:
    - if:
        condition:
          and:
            - switch.is_on: mute_response_switch
            - switch.is_off: media_mute
            - switch.is_off: ext_media_mute
        then:
          - switch.turn_on: media_mute
          - switch.turn_on: ext_media_mute
    - lvgl.page.show: page_lcars
    - component.update: my_display
    - if:
        condition:
          - switch.is_on: output_audio
        then:
          - homeassistant.service:
              service: media_player.play_media
              data:
                entity_id: media_player.${external_media_player}
                media_content_id: !lambda 'return x;'
                media_content_type: music
                announce: "false"
    - delay: 5s
    - lvgl.page.show: page_home
    - component.update: my_display

  on_error:
    - if:
        condition:
          not:
            - voice_assistant.is_running
        then:
          - lvgl.page.show: page_error
          - lambda: 'id(current_page) = "error";'
          - component.update: my_display
          - delay: 4s
          - if:
              condition:
                lambda: 'return id(current_page) == "error";'
              then:
                - lvgl.page.show: page_home
                - lambda: 'id(current_page) = "home";'
                - component.update: my_display

    - lambda: id(global_is_assisting) = false;
   
  on_idle:
    - delay: 25s
    - lvgl.page.show: page_home
    - component.update: my_display       
  on_end:
    - wait_until:
        not:
          voice_assistant.is_running:
    - mixer_speaker.apply_ducking:
        id: media_mixing_input
        decibel_reduction: 0
        duration: 1.0s
    - lambda: id(global_is_assisting) = false;
    - if:
        condition:
          and:
            - switch.is_off: mute_switch
            - lambda: return id(wake_word_engine_location).state == "On device";
        then:
          - voice_assistant.stop
          - micro_wake_word.start

        else:
          if:
            condition:
              - switch.is_off: mute_switch
            then:
              - lambda: id(va).set_use_wake_word(false);
              - voice_assistant.stop:
              - delay: 100ms
              - lambda: id(va).set_use_wake_word(true);
              - delay: 100ms
              - voice_assistant.start
    - if:
        condition:
          and:
            - switch.is_on: mute_response_switch
            - switch.is_on: media_mute
            - switch.is_on: ext_media_mute
        then:
          - switch.turn_off: media_mute
          - switch.turn_off: ext_media_mute

  on_client_connected:
    - if:
        condition:
          and:
            - switch.is_off: mute_switch
            - lambda: return id(wake_word_engine_location).state == "On device";
        then:
          - micro_wake_word.start
        else:
          - if:
              condition:
                - switch.is_off: mute_switch
              then:
                - lambda: id(va).set_use_wake_word(true);
                - voice_assistant.start

  on_timer_started:   
    - globals.set:
        id: timer_active
        value: 'true'
    - lvgl.widget.hide: timer_off_icon   # Cacher icône OFF
    - lvgl.widget.show: timer_play_icon  # Afficher icône PLAY verte    
    - script.execute: timer_ending
    - lvgl.page.show: page_timer
 
  
  on_timer_cancelled:
    - globals.set:
        id: timer_active
        value: 'false'
    - lvgl.widget.hide: timer_play_icon  # Cacher icône PLAY
    - lvgl.widget.show: timer_off_icon   # Afficher icône OFF grise    
    - lambda: id(time_remaining_0).publish_state ("0:00:00"); 
    - delay: 30s
    - lvgl.page.show: page_home
    - component.update: my_display

  on_timer_updated:
    - component.update: my_display
  on_timer_tick:
    - lambda: |-
        int seconds = timers[0].seconds_left;
        int hours = seconds / 3600;
        int minutes = (seconds % 3600) / 60;
        seconds %= 60;
        id(time_remaining_0).publish_state(str_sprintf("%d:%02d:%02d", hours, minutes, seconds));
        id(countdown_time) = timers[0].seconds_left;
        lv_arc_set_value(id(arc_timer), id(countdown_time) % 60);
        char buf[10];
        sprintf(buf, "%d\nsec", id(countdown_time));
        lv_label_set_text(id(timer_label), buf);
    - if:
        condition:
          lambda: "return timers[0].seconds_left <= 20;"
        then:
          - lvgl.page.show: page_timer
    - component.update: my_display


  on_timer_finished:
    - globals.set:
        id: timer_active
        value: 'false'
    - lvgl.widget.hide: timer_play_icon  # Cacher icône PLAY
    - lvgl.widget.show: timer_off_icon   # Afficher icône OFF grise      
    - script.stop: timer_ending
    - lvgl.page.show: page_timer
    #- lvgl.page.show: page_timer_finished
    - component.update: my_display
    - if:
        condition:
          - switch.is_on: output_audio
        then:
          - switch.turn_on: timer_ringing
          - script.execute: timer_end_alert
        else:
          - if:
              condition:
                - switch.is_off: output_audio
              then:
                - switch.turn_on: timer_ringing
                - script.execute: timer_end_alert

    - component.update: my_display

